<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capture face — AI Face Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0F14; --surface:#121821; --border:#212B36; --border-strong:#2C3947;
    --accent:#00E5A0; --danger:#FF5A5A; --text-primary:#E8EDF2;
    --text-secondary:#8A95A2; --text-muted:#566270;
    --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif; --font-mono:'JetBrains Mono',monospace;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    min-height:100vh; background:var(--bg); color:var(--text-primary);
    font-family:var(--font-body); display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{
    width:100%; max-width:420px; background:var(--surface); border:1px solid var(--border);
    border-radius:6px; padding:28px;
  }
  h1{ font-family:var(--font-display); font-size:20px; font-weight:500; margin-bottom:4px; }
  .subtitle{ font-size:13px; color:var(--text-secondary); margin-bottom:18px; }
  .video-wrap{ position:relative; border-radius:4px; overflow:hidden; border:1px solid var(--border-strong); background:#000; }
  video{ width:100%; display:block; transform:scaleX(-1); }
  .frame-box{
    position:absolute; top:15%; left:20%; width:60%; height:70%;
    border:2px solid var(--accent); border-radius:4px; pointer-events:none;
  }
  .status{
    margin-top:16px; font-family:var(--font-mono); font-size:12px; color:var(--accent);
    display:flex; justify-content:space-between; letter-spacing:0.04em;
  }
  .bar-track{ margin-top:8px; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
  .bar-fill{ height:100%; width:0%; background:var(--accent); transition:width 0.2s ease; }
  .msg{ margin-top:14px; font-size:13px; color:var(--text-secondary); min-height:18px; }
  .done{ display:none; text-align:center; margin-top:10px; }
  .done a{
    display:inline-block; margin-top:12px; background:var(--accent); color:#04140F;
    font-family:var(--font-display); font-weight:500; font-size:14px; text-decoration:none;
    padding:12px 20px; border-radius:4px;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Capturing face — {{ register_number }}</h1>
  <p class="subtitle">Look at the camera and move your head slightly. Keep your face inside the frame.</p>

  <div class="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="frame-box"></div>
  </div>
  <canvas id="canvas" style="display:none;"></canvas>

  <div class="status">
    <span id="count-label">Images: 0/40</span>
    <span id="state-label">Starting camera…</span>
  </div>
  <div class="bar-track"><div class="bar-fill" id="bar-fill"></div></div>
  <p class="msg" id="msg"></p>

  <div class="done" id="done-box">
    <p>Capture complete. You can train the model from the dashboard.</p>
    <a href="{{ url_for('dashboard') }}">Back to dashboard</a>
  </div>
</div>

<script>
const registerNumber = "{{ register_number }}";
const TARGET_COUNT = 40;
let savedCount = 0;
let capturing = true;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const countLabel = document.getElementById("count-label");
const stateLabel = document.getElementById("state-label");
const barFill = document.getElementById("bar-fill");
const msg = document.getElementById("msg");
const doneBox = document.getElementById("done-box");

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 480, height: 360 } });
    video.srcObject = stream;
    stateLabel.textContent = "Scanning";
    captureLoop();
  } catch (err) {
    stateLabel.textContent = "Camera error";
    msg.textContent = "Could not access the camera: " + err.message + ". Check browser permissions.";
  }
}

function captureFrame() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL("image/jpeg", 0.85);
}

async function captureLoop() {
  if (!capturing || savedCount >= TARGET_COUNT) return;

  const image = captureFrame();

  try {
    const res = await fetch("/api/save_face_image", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ register_number: registerNumber, image: image })
    });
    const data = await res.json();

    if (data.status === "saved") {
      savedCount = data.count;
      countLabel.textContent = `Images: ${savedCount}/${TARGET_COUNT}`;
      barFill.style.width = Math.min(100, (savedCount / TARGET_COUNT) * 100) + "%";
      msg.textContent = "";
    } else if (data.status === "no_face") {
      msg.textContent = "No face detected — center your face in the frame.";
    } else if (data.error) {
      msg.textContent = "Error: " + data.error;
    }
  } catch (e) {
    msg.textContent = "Network error while saving image.";
  }

  if (savedCount >= TARGET_COUNT) {
    capturing = false;
    stateLabel.textContent = "Done";
    doneBox.style.display = "block";
    const stream = video.srcObject;
    if (stream) stream.getTracks().forEach(t => t.stop());
    return;
  }

  setTimeout(captureLoop, 400);
}

startCamera();
</script>

</body>
</html>
